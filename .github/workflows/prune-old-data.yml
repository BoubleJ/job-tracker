name: prune-old-data

on:
  schedule:
    # UTC 15:00 = KST 00:00 — 매일 자정(KST)에 보존 기간 초과 지원건 정리
    - cron: "0 15 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "삭제 없이 대상만 출력 (1이면 dry-run)"
        required: false
        default: "0"

concurrency:
  group: prune-old-data
  cancel-in-progress: false

jobs:
  prune-old-data:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Enable corepack (pnpm)
        run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prune applications older than retention window
        run: pnpm --filter @job-tracker/worker prune-old
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          # 지원일 기준 보존 개월 수 (기본 7)
          RETENTION_MONTHS: "7"
          # 수동 실행 시 dry-run 지원 (cron 실행은 실제 삭제)
          RETENTION_DRY_RUN: ${{ github.event.inputs.dry_run || '0' }}
