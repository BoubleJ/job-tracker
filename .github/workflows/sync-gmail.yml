name: sync-gmail

on:
  schedule:
    # UTC 00:00 / 06:00 / 12:00 = KST 09:00 / 15:00 / 21:00 — 한국 업무시간 커버, 하루 3회
    - cron: "0 0,6,12 * * *"
  workflow_dispatch:

# 이전 실행이 끝나기 전에 다음 cron이 겹치지 않도록 큐잉 (취소하지 않음 — 증분 동기화라 순차 실행이 안전)
concurrency:
  group: sync-gmail
  cancel-in-progress: false

jobs:
  sync-gmail:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Enable corepack (pnpm)
        run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Gmail sync worker
        run: pnpm --filter @job-tracker/worker sync-gmail
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          # 비밀 아님 — secrets 미설정 시 기본값 사용 (업체/모델 교체는 secrets 값만 바꾸면 됨)
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL || 'https://api.groq.com/openai/v1' }}
          LLM_MODEL_FILTER: ${{ secrets.LLM_MODEL_FILTER || 'openai/gpt-oss-20b' }}
          LLM_MODEL_EXTRACT: ${{ secrets.LLM_MODEL_EXTRACT || 'openai/gpt-oss-120b' }}
